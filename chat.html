<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instagram Pro • Chats</title>
<link rel="stylesheet" href="styles.css"/>
<link href="https://fonts.googleapis.com/css2?family=Billabong&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="chat-body">
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <h2 class="me" id="meName">user</h2>
        <button class="icon-btn" id="logoutBtn" title="Log out">⎋</button>
      </header>
      <div class="search">
        <input id="searchInput" type="text" placeholder="Search"/>
      </div>
      <div class="story-row" id="storyRow"></div>
      <div class="chat-list-head">
        <span>Messages</span>
        <a href="#" id="newChatBtn">＋ New</a>
      </div>
      <ul class="chat-list" id="chatList"></ul>
    </aside>

    <section class="conversation" id="conversation">
      <header class="conv-header">
        <button class="icon-btn back-btn" id="backBtn">‹</button>
        <img class="avatar" id="convAvatar" alt="" />
        <div class="conv-meta">
          <h3 id="convName">Select a chat</h3>
          <span id="convStatus" class="status">—</span>
        </div>
        <div class="conv-actions">
          <button class="icon-btn" title="Call">📞</button>
          <button class="icon-btn" title="Video">🎥</button>
          <button class="icon-btn" title="Info">ⓘ</button>
        </div>
      </header>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-circle">✈️</div>
          <h3>Your messages</h3>
          <p>Send a message to start a chat.</p>
        </div>
      </div>

      <form class="composer" id="composer" hidden>
        <button type="button" class="icon-btn" title="Emoji">😊</button>
        <input type="text" id="msgInput" placeholder="Message..." autocomplete="off"/>
        <button type="button" class="icon-btn" title="Image">🖼️</button>
        <button type="submit" class="send-btn" id="sendBtn">Send</button>
      </form>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
